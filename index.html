<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>土間コンクリート数量計算アプリ</title>
  <style>
    :root{
      --bg:#eef5ff; --card:#ffffff; --text:#16324f; --muted:#5b728d; --line:#d7e4f4;
      --blue:#1f6fd6; --blue-dark:#185bb0; --blue-soft:#dbeafe;
      --warn:#a86500; --warn-bg:#fff6ea; --warn-line:#f0c27a;
      --ok:#0f8a5f; --ok-bg:#e8f7ef; --ok-line:#a8dec2;
      --danger:#d64545; --danger-bg:#fde8e8; --danger-line:#f3b5b5;
      --shadow:0 8px 24px rgba(22,50,79,.08); --radius:16px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif}
    body{padding-bottom:24px}
    .app{max-width:960px;margin:0 auto;padding:14px}
    .panel,.card,.shape-panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
    .panel,.shape-panel,.card{padding:14px;margin-bottom:12px}
    h1{margin:0;font-size:22px}
    .sub{font-size:13px;color:var(--muted)}
    .section-title{font-size:15px;font-weight:900;margin:0}
    .field{margin-bottom:12px}
    .field:last-child{margin-bottom:0}
    label{display:block;font-size:13px;font-weight:800;margin-bottom:6px}
    input[type="number"], select{
      width:100%; min-height:48px; border:1px solid var(--line); border-radius:12px;
      padding:12px 14px; font-size:16px; color:var(--text); background:#fff; outline:none; appearance:none;
    }
    input:focus, select:focus{border-color:var(--blue);box-shadow:0 0 0 4px rgba(31,111,214,.12)}
    .button-row,.sign-row,.quick-row,.card-actions{display:flex;gap:8px;flex-wrap:wrap}
    .button-row .btn,.quick-row .btn,.sign-row .btn{flex:1}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .summary-layout{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .summary-full{grid-column:1 / -1}
    .shape-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
    .btn,.shape-btn{
      min-height:42px;border-radius:12px;border:1px solid var(--line);background:#fff;color:var(--text);
      padding:8px 12px;font-size:14px;font-weight:800;cursor:pointer
    }
    .btn{min-height:44px;padding:10px 14px;font-size:15px}
    .btn-blue{background:var(--blue);border-color:var(--blue);color:#fff}
    .btn-blue:active{background:var(--blue-dark)}
    .btn-soft{color:var(--blue);border-color:#9dc3f8;background:#fff}
    .btn-danger{background:var(--danger-bg);color:var(--danger);border-color:var(--danger-line)}
    .btn.active{background:var(--blue-soft);border-color:#9dc3f8;color:var(--blue-dark)}
    .btn.full{width:100%}
    .shape-btn{display:flex;align-items:center;justify-content:space-between;border-color:#9dc3f8;color:var(--blue)}
    .shape-left{display:flex;align-items:center;gap:8px;min-width:0}
    .shape-icon{font-size:17px;line-height:1}
    .unit-input{position:relative}
    .unit-input input{padding-right:68px}
    .unit{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:13px;font-weight:800;color:var(--muted);pointer-events:none}
    .summary-box{border:1px solid var(--line);border-radius:14px;background:#f8fbff;padding:12px}
    .summary-box .k{font-size:12px;font-weight:800;color:var(--muted);margin-bottom:6px}
    .summary-box .v{font-size:24px;font-weight:900;line-height:1.2}
    .summary-box .s{font-size:13px;font-weight:800;color:var(--muted);margin-top:4px;min-height:18px}
    .summary-box .flag{display:inline-block;margin-top:6px;padding:4px 8px;border-radius:999px;background:#fff1d8;color:var(--warn);border:1px solid var(--warn-line);font-size:12px;font-weight:900}
    .cards{display:grid;gap:12px}
    .empty{text-align:center;padding:20px;border:1px dashed #adc7e8;border-radius:16px;background:rgba(255,255,255,.7);color:var(--muted);font-weight:800}
    .card.unregistered{border:2px solid var(--warn-line);background:var(--warn-bg);box-shadow:0 10px 30px rgba(168,101,0,.10)}
    .card-header{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:12px}
    .card-title{font-size:18px;font-weight:900}
    .card-sub{font-size:13px;color:var(--muted);margin-top:3px}
    .compact-line{font-size:13px;color:var(--text);font-weight:800;margin-top:6px}
    .badge{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:900;margin-top:8px}
    .badge.warn{background:#fff1d8;color:var(--warn);border:1px solid var(--warn-line)}
    .badge.ok{background:var(--ok-bg);color:var(--ok);border:1px solid var(--ok-line)}
    .stats-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
    .stat{border:1px solid var(--line);border-radius:12px;background:#f8fbff;padding:10px 12px}
    .stat .k{font-size:12px;font-weight:800;color:var(--muted);margin-bottom:4px}
    .stat .v{font-size:18px;font-weight:900}
    .thickness-text{margin-top:8px;font-size:13px;font-weight:800;color:var(--muted)}
    .help{margin-top:10px;font-size:13px;font-weight:900;color:var(--warn)}
    .error{margin-top:10px;font-size:13px;font-weight:900;color:var(--danger);min-height:18px}
    .collapsed-body{display:none}
    .hidden{display:none!important}
    .note{font-size:12px;color:var(--muted);margin-top:8px}
    @media (max-width:700px){
      .grid-2,.stats-row{grid-template-columns:1fr}
      .summary-layout{grid-template-columns:1fr 1fr}
      .summary-full{grid-column:1 / -1}
      .card-header{flex-direction:column}
      .card-actions{width:100%}
      .card-actions .btn{flex:1}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="panel">
      <h1>土間コンクリート数量計算アプリ</h1>
    </div>

    <div class="panel">
      <div class="summary-layout">
        <div class="summary-box summary-full">
          <div class="k">合計面積</div>
          <div class="v" id="totalArea">-- ㎡</div>
        </div>

        <div class="summary-box">
          <div class="k">純数量</div>
          <div class="v" id="totalVolume">-- m³</div>
        </div>
        <div class="summary-box">
          <div class="k">余裕込み</div>
          <div class="v" id="totalWithWaste">-- m³</div>
        </div>

        <div class="summary-box">
          <div class="k">中型車（3.5㎥）</div>
          <div class="v" id="mixer35Count">--</div>
          <div class="s" id="mixer35Cost"></div>
          <div class="flag hidden" id="mixer35Flag">空積料適用</div>
        </div>
        <div class="summary-box">
          <div class="k">立米車（1.5㎥）</div>
          <div class="v" id="mixer15Count">--</div>
          <div class="s" id="mixer15Cost"></div>
          <div class="flag hidden" id="mixer15Flag">空積料適用</div>
        </div>

        <div class="summary-box">
          <div class="k">ワイヤーメッシュ</div>
          <div class="v" id="meshCount">--</div>
          <div class="s" id="meshCost"></div>
        </div>
        <div class="summary-box">
          <div class="k">スペーサー</div>
          <div class="v" id="spacerCount">--</div>
          <div class="s" id="spacerCost"></div>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="field">
        <label>厚み設定</label>
        <div class="button-row">
          <button id="modeGlobal" class="btn active" type="button">一括</button>
          <button id="modePer" class="btn" type="button">区画ごと</button>
        </div>
      </div>
      <div class="field" id="globalThicknessWrap">
        <label for="globalThickness">一括厚み</label>
        <div class="unit-input">
          <input id="globalThickness" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="100" />
          <span class="unit">mm</span>
        </div>
        <div class="quick-row" style="margin-top:8px;">
          <button class="btn quick-btn" data-thickness="100" type="button">100</button>
          <button class="btn quick-btn" data-thickness="110" type="button">110</button>
          <button class="btn quick-btn" data-thickness="120" type="button">120</button>
          <button class="btn quick-btn" data-thickness="70" type="button">70</button>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="field">
        <label for="wasteRate">余裕率</label>
        <select id="wasteRate">
          <option value="0">0%</option>
          <option value="5">5%</option>
          <option value="10">10%</option>
          <option value="15">15%</option>
          <option value="20">20%</option>
        </select>
      </div>
    </div>

    <div class="panel">
      <div class="button-row" style="justify-content:space-between; align-items:center;">
        <div class="section-title">金額設定</div>
        <button id="togglePriceBtn" class="btn btn-soft" type="button">開く</button>
      </div>
      <div id="pricePanelBody" class="hidden" style="margin-top:10px;">
        <div class="grid-2">
          <div class="field">
            <label for="priceMixer15">立米車（1.5㎥）基本単価</label>
            <div class="unit-input">
              <input id="priceMixer15" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="38600" />
              <span class="unit">円/㎥</span>
            </div>
          </div>
          <div class="field">
            <label for="minQty15">立米車 最低数量</label>
            <div class="unit-input">
              <input id="minQty15" type="number" inputmode="decimal" placeholder="1.25" />
              <span class="unit">㎥</span>
            </div>
          </div>
          <div class="field">
            <label for="emptyFee15">立米車 空積料</label>
            <div class="unit-input">
              <input id="emptyFee15" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="3000" />
              <span class="unit">円</span>
            </div>
          </div>

          <div class="field">
            <label for="priceMixer35">中型車（3.5㎥）基本単価</label>
            <div class="unit-input">
              <input id="priceMixer35" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="36100" />
              <span class="unit">円/㎥</span>
            </div>
          </div>
          <div class="field">
            <label for="minQty35">中型車 最低数量</label>
            <div class="unit-input">
              <input id="minQty35" type="number" inputmode="decimal" placeholder="3.0" />
              <span class="unit">㎥</span>
            </div>
          </div>
          <div class="field">
            <label for="emptyFee35">中型車 空積加算単価</label>
            <div class="unit-input">
              <input id="emptyFee35" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="2000" />
              <span class="unit">円/㎥</span>
            </div>
          </div>

          <div class="field">
            <label for="priceMesh">ワイヤーメッシュ 単価</label>
            <div class="unit-input">
              <input id="priceMesh" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="0" />
              <span class="unit">円/枚</span>
            </div>
          </div>
          <div class="field">
            <label for="priceSpacer">スペーサー 単価</label>
            <div class="unit-input">
              <input id="priceSpacer" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="0" />
              <span class="unit">円/個</span>
            </div>
          </div>
        </div>
        <div class="button-row" style="margin-top:10px;">
          <button id="saveBtn" class="btn btn-soft" type="button">金額を保存</button>
          <button id="loadBtn" class="btn btn-soft" type="button">読込</button>
        </div>
        <div class="note">金額設定のみブラウザ保存します。数量データや区画データは保存しません。</div>
      </div>
    </div>

    <div class="panel">
      <div class="button-row">
        <button id="resetBtn" class="btn btn-danger" type="button">リセット</button>
      </div>
    </div>

    <div id="cards" class="cards"></div>
    <div id="emptyState" class="empty">まだ区画がありません。下の区画追加ボタンから追加してください。</div>

    <div class="shape-panel">
      <div class="sub" style="margin-bottom:8px;">区画追加</div>
      <div class="shape-grid">
        <button class="shape-btn" data-shape="rectangle" type="button"><span class="shape-left"><span class="shape-icon">▭</span><span>長方形</span></span><span>追加</span></button>
        <button class="shape-btn" data-shape="triangle" type="button"><span class="shape-left"><span class="shape-icon">◺</span><span>三角形</span></span><span>追加</span></button>
        <button class="shape-btn" data-shape="trapezoid" type="button"><span class="shape-left"><span class="shape-icon">⏢</span><span>台形</span></span><span>追加</span></button>
        <button class="shape-btn" data-shape="heron" type="button"><span class="shape-left"><span class="shape-icon">△</span><span>ヘロン（3辺）</span></span><span>追加</span></button>
        <button class="shape-btn" data-shape="manualArea" type="button"><span class="shape-left"><span class="shape-icon">㎡</span><span>面積入力</span></span><span>追加</span></button>
        <button class="shape-btn" data-shape="manualVolume" type="button"><span class="shape-left"><span class="shape-icon">㎥</span><span>体積入力</span></span><span>追加</span></button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'doma_calc_price_only_v2';

    const shapeDefs = {
      rectangle: {
        label:'長方形', icon:'▭', helper:'縦 × 横',
        fields:[{key:'l',label:'縦',unit:'mm'},{key:'w',label:'横',unit:'mm'}],
        calc(v){
          const l=num(v.l), w=num(v.w);
          if(!positive(l)||!positive(w)) return {area:null};
          return {area:mm2ToM2(l*w)};
        }
      },
      triangle: {
        label:'三角形', icon:'◺', helper:'底辺 × 高さ（直角） ÷ 2',
        fields:[{key:'b',label:'底辺',unit:'mm'},{key:'h',label:'高さ（直角）',unit:'mm'}],
        calc(v){
          const b=num(v.b), h=num(v.h);
          if(!positive(b)||!positive(h)) return {area:null};
          return {area:mm2ToM2((b*h)/2)};
        }
      },
      trapezoid: {
        label:'台形', icon:'⏢', helper:'(上底 + 下底) × 高さ（直角） ÷ 2',
        fields:[{key:'t',label:'上底',unit:'mm'},{key:'b',label:'下底',unit:'mm'},{key:'h',label:'高さ（直角）',unit:'mm'}],
        calc(v){
          const t=num(v.t), b=num(v.b), h=num(v.h);
          if(!positive(t)||!positive(b)||!positive(h)) return {area:null};
          return {area:mm2ToM2(((t+b)*h)/2)};
        }
      },
      heron: {
        label:'ヘロン（3辺）', icon:'△', helper:'3辺で面積算出（ヘロン）',
        fields:[{key:'a',label:'辺①',unit:'mm'},{key:'b',label:'辺②',unit:'mm'},{key:'c',label:'辺③',unit:'mm'}],
        calc(v){
          const a=num(v.a), b=num(v.b), c=num(v.c);
          if(![a,b,c].every(positive)) return {area:null};
          const area=heronArea(a,b,c);
          if(area==null) return {area:null,error:'三角形が成立しません。辺の長さを確認してください。'};
          return {area};
        }
      },
      manualArea: {
        label:'面積入力', icon:'㎡', helper:'面積を直接入力',
        fields:[{key:'area',label:'面積',unit:'㎡'}],
        calc(v){
          const area=num(v.area);
          if(!positive(area)) return {area:null};
          return {area};
        }
      },
      manualVolume: {
        label:'体積入力', icon:'㎥', helper:'体積を直接入力',
        fields:[{key:'volume',label:'体積',unit:'㎥'}],
        calc(v){
          const volume=num(v.volume);
          if(!positive(volume)) return {manualVolume:null};
          return {manualVolume:volume};
        }
      }
    };

    const state = {
      thicknessMode:'global',
      globalThickness:100,
      wasteRate:0,
      priceMixer15:38600,
      priceMixer35:36100,
      priceMesh:'',
      priceSpacer:'',
      emptyFee15:3000,
      emptyFee35:2000,
      minQty15:1.25,
      minQty35:3,
      pricePanelOpen:false,
      shapes:[]
    };

    const els = {
      modeGlobal: document.getElementById('modeGlobal'),
      modePer: document.getElementById('modePer'),
      globalThicknessWrap: document.getElementById('globalThicknessWrap'),
      globalThickness: document.getElementById('globalThickness'),
      wasteRate: document.getElementById('wasteRate'),
      priceMixer15: document.getElementById('priceMixer15'),
      priceMixer35: document.getElementById('priceMixer35'),
      priceMesh: document.getElementById('priceMesh'),
      priceSpacer: document.getElementById('priceSpacer'),
      emptyFee15: document.getElementById('emptyFee15'),
      emptyFee35: document.getElementById('emptyFee35'),
      minQty15: document.getElementById('minQty15'),
      minQty35: document.getElementById('minQty35'),
      togglePriceBtn: document.getElementById('togglePriceBtn'),
      pricePanelBody: document.getElementById('pricePanelBody'),
      quickButtons: Array.from(document.querySelectorAll('.quick-btn')),
      shapeButtons: Array.from(document.querySelectorAll('.shape-btn')),
      cards: document.getElementById('cards'),
      emptyState: document.getElementById('emptyState'),
      totalArea: document.getElementById('totalArea'),
      totalVolume: document.getElementById('totalVolume'),
      totalWithWaste: document.getElementById('totalWithWaste'),
      mixer35Count: document.getElementById('mixer35Count'),
      mixer35Cost: document.getElementById('mixer35Cost'),
      mixer35Flag: document.getElementById('mixer35Flag'),
      mixer15Count: document.getElementById('mixer15Count'),
      mixer15Cost: document.getElementById('mixer15Cost'),
      mixer15Flag: document.getElementById('mixer15Flag'),
      meshCount: document.getElementById('meshCount'),
      meshCost: document.getElementById('meshCost'),
      spacerCount: document.getElementById('spacerCount'),
      spacerCost: document.getElementById('spacerCost'),
      saveBtn: document.getElementById('saveBtn'),
      loadBtn: document.getElementById('loadBtn'),
      resetBtn: document.getElementById('resetBtn')
    };

    function uid(){ return `${Date.now()}-${Math.random().toString(36).slice(2,8)}`; }
    function num(v){ return v === '' || v == null ? null : Number(v); }
    function positive(v){ return typeof v === 'number' && Number.isFinite(v) && v > 0; }
    function mm2ToM2(v){ return v / 1000000; }
    function mmToM(v){ return v / 1000; }
    function heronArea(aMm,bMm,cMm){
      const a=mmToM(aMm), b=mmToM(bMm), c=mmToM(cMm);
      if(a+b<=c || a+c<=b || b+c<=a) return null;
      const s=(a+b+c)/2;
      return Math.sqrt(s*(s-a)*(s-b)*(s-c));
    }
    function formatSignedArea(v){ return v == null ? '-- ㎡' : `${v < 0 ? '−' : ''}${Math.abs(v).toFixed(2)} ㎡`; }
    function formatVolume(v){ return v == null ? '-- m³' : `${v.toFixed(2)} m³`; }
    function formatSignedVolume(v){ return v == null ? '-- m³' : `${v > 0 ? '+' : v < 0 ? '−' : ''}${Math.abs(v).toFixed(2)} m³`; }
    function formatCount(v, suffix=''){ return v == null ? '--' : `${v}${suffix}`; }
    function formatYen(v){ return v == null ? '--' : `${Math.round(v).toLocaleString('ja-JP')} 円`; }
    function getDisplayNo(id){ return state.shapes.findIndex(s => s.id === id) + 1; }
    function effectiveThickness(shape){ return state.thicknessMode === 'global' ? num(state.globalThickness) : num(shape.thickness); }

    function recalcShape(shape){
      const def=shapeDefs[shape.type];
      const result=def.calc(shape.values || {});
      const area=result.area ?? null;

      if(shape.type === 'manualVolume'){
        return { area:null, volume: result.manualVolume ?? null, error: result.error || '' };
      }

      const thickness=effectiveThickness(shape);
      const volume=area != null && positive(thickness) ? area * mmToM(thickness) : null;
      return { area, volume, error: result.error || '' };
    }

    function validateShape(shape){
      const def=shapeDefs[shape.type];

      for(const f of def.fields){
        if(!positive(num(shape.values[f.key]))) return `${def.label}の必要な数値を入力してください。`;
      }

      if(shape.type !== 'manualVolume' && state.thicknessMode === 'per' && !positive(num(shape.thickness))){
        return '厚みを入力してください。';
      }

      const calc=recalcShape(shape);
      if(calc.error) return calc.error;

      if(shape.type === 'manualVolume'){
        if(calc.volume == null) return '体積を入力してください。';
      } else {
        if(calc.area == null) return `${def.label}の数値を確認してください。`;
      }

      return '';
    }

    function addShape(type){
      const def=shapeDefs[type];
      const values={};
      def.fields.forEach(f => values[f.key]='');

      state.shapes.push({
        id:uid(),
        type,
        sign:1,
        values,
        thickness:(state.thicknessMode === 'per' && type !== 'manualVolume') ? 100 : '',
        registered:false,
        collapsed:false,
        errorMessage:''
      });

      renderAll();

      requestAnimationFrame(() => {
        const card=els.cards.lastElementChild;
        if(card){
          card.scrollIntoView({behavior:'smooth', block:'center'});
          const firstInput=card.querySelector('input[data-action="field"]');
          if(firstInput) firstInput.focus();
        }
      });
    }

    function createFieldsHtml(shape, def){
      return def.fields.map(f => `
        <div class="field">
          <label>${f.label}</label>
          <div class="unit-input">
            <input type="number" inputmode="decimal" placeholder="0" value="${escapeAttr(shape.values[f.key] ?? '')}" data-action="field" data-id="${shape.id}" data-key="${f.key}">
            <span class="unit">${f.unit || 'mm'}</span>
          </div>
        </div>
      `).join('');
    }

    function createCard(shape){
      const def=shapeDefs[shape.type];
      const card=document.createElement('div');
      card.className='card';
      card.dataset.id=shape.id;

      const addLabel = shape.type === 'manualVolume' ? '＋ 体積を足す' : '＋ 面積を足す';
      const subLabel = shape.type === 'manualVolume' ? '－ 体積を引く' : '－ 面積を引く';

      card.innerHTML = `
        <div class="card-header">
          <div>
            <div class="card-title">区画${getDisplayNo(shape.id)}</div>
            <div class="card-sub">${def.icon} ${def.label} / ${def.helper}</div>
            <div class="badge ${shape.registered ? 'ok' : 'warn'} status-badge">${shape.registered ? '登録済み' : '未登録・合計未反映'}</div>
            <div class="compact-line"></div>
          </div>
          <div class="card-actions">
            <button class="btn btn-soft" type="button" data-action="toggle" data-id="${shape.id}">閉じる</button>
            <button class="btn btn-soft" type="button" data-action="copy" data-id="${shape.id}">複製</button>
            <button class="btn btn-danger" type="button" data-action="delete" data-id="${shape.id}">削除</button>
          </div>
        </div>

        <div class="card-body">
          <div class="sign-row">
            <button class="btn sign-add ${shape.sign === 1 ? 'active' : ''}" type="button" data-action="setAdd" data-id="${shape.id}">${addLabel}</button>
            <button class="btn sign-sub ${shape.sign === -1 ? 'active' : ''}" type="button" data-action="setSubtract" data-id="${shape.id}">${subLabel}</button>
          </div>

          <div class="grid-2" style="margin-top:10px;">
            ${createFieldsHtml(shape, def)}
          </div>

          <div class="per-thickness-wrap" style="display:${state.thicknessMode === 'per' && shape.type !== 'manualVolume' ? '' : 'none'}; margin-top:${state.thicknessMode === 'per' && shape.type !== 'manualVolume' ? '8px' : '0'};">
            <div class="field">
              <label>厚み</label>
              <div class="unit-input">
                <input type="number" inputmode="numeric" pattern="[0-9]*" placeholder="100" value="${escapeAttr(shape.thickness ?? '')}" data-action="thickness" data-id="${shape.id}">
                <span class="unit">mm</span>
              </div>
            </div>
          </div>

          <div class="stats-row">
            <div class="stat"><div class="k">面積</div><div class="v area-value">-- ㎡</div></div>
            <div class="stat"><div class="k">体積</div><div class="v volume-value">-- m³</div></div>
          </div>

          <div class="thickness-text thickness-value">厚み: -- mm</div>
          <div class="help help-text"></div>
          <div class="error error-text"></div>

          <div style="margin-top:14px;">
            <button class="btn btn-blue full register-btn" type="button" data-action="register" data-id="${shape.id}">${def.icon} ${def.label}を登録</button>
          </div>
        </div>
      `;

      refreshCard(card, shape);
      return card;
    }

    function refreshCard(card, shape){
      const calc=recalcShape(shape);
      const signedArea=calc.area != null ? calc.area * shape.sign : null;
      const signedVolume=calc.volume != null ? calc.volume * shape.sign : null;
      const thickness=effectiveThickness(shape);

      card.classList.toggle('unregistered', !shape.registered);
      card.querySelector('.card-body').classList.toggle('collapsed-body', !!(shape.registered && shape.collapsed));

      card.querySelector('.card-title').textContent=`区画${getDisplayNo(shape.id)}`;

      const badge=card.querySelector('.status-badge');
      badge.className=`badge ${shape.registered ? 'ok' : 'warn'} status-badge`;
      badge.textContent=shape.registered ? '登録済み' : '未登録・合計未反映';

      card.querySelector('.sign-add').classList.toggle('active', shape.sign === 1);
      card.querySelector('.sign-sub').classList.toggle('active', shape.sign === -1);

      card.querySelector('.area-value').textContent=formatSignedArea(signedArea);
      card.querySelector('.volume-value').textContent=formatSignedVolume(signedVolume);

      card.querySelector('.thickness-value').textContent = shape.type === 'manualVolume'
        ? '厚み: 不要'
        : `厚み: ${positive(thickness) ? `${Number(thickness)} mm` : '-- mm'}`;

      const compact=card.querySelector('.compact-line');
      if(shape.registered){
        if(shape.type === 'manualVolume'){
          compact.textContent = `体積 ${formatSignedVolume(signedVolume)}`;
        } else {
          compact.textContent = state.thicknessMode === 'per'
            ? `面積 ${formatSignedArea(signedArea)} / 厚み ${positive(thickness) ? `${Number(thickness)} mm` : '-- mm'}`
            : `面積 ${formatSignedArea(signedArea)}`;
        }
      } else {
        compact.textContent = '';
      }

      const toggleBtn=card.querySelector('[data-action="toggle"]');
      toggleBtn.textContent = shape.registered && shape.collapsed ? '開く' : '閉じる';
      toggleBtn.disabled = !shape.registered;

      card.querySelector('.help-text').textContent = shape.registered ? '' : 'この区画はまだ合計に入っていません。数値を確認して登録してください。';
      card.querySelector('.error-text').textContent = shape.errorMessage || calc.error || '';

      const registerBtn=card.querySelector('.register-btn');
      if(shape.registered){
        registerBtn.textContent = `✔ 登録済み（${shapeDefs[shape.type].label}）`;
        registerBtn.classList.remove('btn-blue');
        registerBtn.classList.add('btn-soft');
      } else {
        registerBtn.textContent = `${shapeDefs[shape.type].icon} ${shapeDefs[shape.type].label}を登録`;
        registerBtn.classList.add('btn-blue');
        registerBtn.classList.remove('btn-soft');
      }
    }

    function renderAll(){
      els.globalThickness.value = state.globalThickness ?? 100;
      els.wasteRate.value = String(state.wasteRate ?? 0);
      els.priceMixer15.value = state.priceMixer15 ?? 38600;
      els.priceMixer35.value = state.priceMixer35 ?? 36100;
      els.priceMesh.value = state.priceMesh ?? '';
      els.priceSpacer.value = state.priceSpacer ?? '';
      els.emptyFee15.value = state.emptyFee15 ?? 3000;
      els.emptyFee35.value = state.emptyFee35 ?? 2000;
      els.minQty15.value = state.minQty15 ?? 1.25;
      els.minQty35.value = state.minQty35 ?? 3;

      els.modeGlobal.classList.toggle('active', state.thicknessMode === 'global');
      els.modePer.classList.toggle('active', state.thicknessMode === 'per');
      els.globalThicknessWrap.style.display = state.thicknessMode === 'global' ? '' : 'none';

      els.pricePanelBody.classList.toggle('hidden', !state.pricePanelOpen);
      els.togglePriceBtn.textContent = state.pricePanelOpen ? '閉じる' : '開く';

      els.quickButtons.forEach(btn => {
        btn.classList.toggle('active', Number(btn.dataset.thickness) === Number(state.globalThickness));
      });

      els.cards.innerHTML = '';
      els.emptyState.style.display = state.shapes.length ? 'none' : 'block';
      state.shapes.forEach(shape => els.cards.appendChild(createCard(shape)));

      refreshTotals();
    }

    function refreshTotals(){
      let totalArea=0;
      let totalVolume=0;
      let areaCount=0;
      let volumeCount=0;
      let manualVolumeOnly=0;

      state.shapes.forEach(shape => {
        if(!shape.registered) return;
        const calc=recalcShape(shape);
        if(calc.error) return;

        if(calc.area != null){
          totalArea += calc.area * shape.sign;
          areaCount++;
        }
        if(calc.volume != null){
          totalVolume += calc.volume * shape.sign;
          volumeCount++;
        }
        if(shape.type === 'manualVolume' && calc.volume != null){
          manualVolumeOnly += calc.volume * shape.sign;
        }
      });

      const areaDisplay = areaCount ? totalArea : null;
      const volumeDisplay = volumeCount ? totalVolume : null;
      const withWaste = volumeDisplay != null ? volumeDisplay * (1 + Number(state.wasteRate) / 100) : null;
      const orderedQty = withWaste != null && withWaste > 0 ? Math.ceil(withWaste / 0.25) * 0.25 : null;

      const meshCount = areaDisplay != null ? Math.ceil(Math.abs(areaDisplay) / 1.8) : null;
      const spacerCount = areaDisplay != null ? Math.ceil(Math.abs(areaDisplay) * 1.5) : null;

      const mixer15Count = orderedQty != null ? (orderedQty / 1.5).toFixed(1) : null;
      const mixer35Count = orderedQty != null ? (orderedQty / 3.5).toFixed(1) : null;

      const minQty15 = positive(num(state.minQty15)) ? Number(state.minQty15) : 1.25;
      const minQty35 = positive(num(state.minQty35)) ? Number(state.minQty35) : 3;
      const emptyApplied15 = orderedQty != null && orderedQty < minQty15;
      const emptyApplied35 = orderedQty != null && orderedQty < minQty35;

      const meshCost = positive(num(state.priceMesh)) && meshCount != null ? meshCount * Number(state.priceMesh) : null;
      const spacerCost = positive(num(state.priceSpacer)) && spacerCount != null ? spacerCount * Number(state.priceSpacer) : null;

      let mixer15Cost = null;
      if(positive(num(state.priceMixer15)) && orderedQty != null){
        mixer15Cost = orderedQty * Number(state.priceMixer15);
        if(emptyApplied15 && positive(num(state.emptyFee15))){
          mixer15Cost += Number(state.emptyFee15);
        }
      }

      let mixer35Cost = null;
      if(positive(num(state.priceMixer35)) && orderedQty != null){
        let unit35 = Number(state.priceMixer35);
        if(emptyApplied35 && positive(num(state.emptyFee35))){
          unit35 += Number(state.emptyFee35);
        }
        mixer35Cost = orderedQty * unit35;
      }

      const areaText = (areaDisplay == null && manualVolumeOnly === 0)
        ? '-- ㎡'
        : (manualVolumeOnly !== 0
            ? `${formatSignedArea(areaDisplay == null ? 0 : areaDisplay)} + ${formatSignedVolume(manualVolumeOnly)}`
            : formatSignedArea(areaDisplay));

      els.totalArea.textContent = areaText;
      els.totalVolume.textContent = formatVolume(volumeDisplay);
      els.totalWithWaste.textContent = withWaste == null ? '-- m³' : `${formatVolume(withWaste)} (${state.wasteRate}%)`;

      els.mixer35Count.textContent = mixer35Count != null ? `${mixer35Count} 台` : '--';
      els.mixer15Count.textContent = mixer15Count != null ? `${mixer15Count} 台` : '--';
      els.meshCount.textContent = formatCount(meshCount, ' 枚');
      els.spacerCount.textContent = formatCount(spacerCount, ' 個');

      els.mixer35Cost.textContent = mixer35Cost == null ? '' : `金額 ${formatYen(mixer35Cost)}`;
      els.mixer15Cost.textContent = mixer15Cost == null ? '' : `金額 ${formatYen(mixer15Cost)}`;
      els.meshCost.textContent = meshCost == null ? '' : `金額 ${formatYen(meshCost)}`;
      els.spacerCost.textContent = spacerCost == null ? '' : `金額 ${formatYen(spacerCost)}`;

      els.mixer15Flag.classList.toggle('hidden', !emptyApplied15);
      els.mixer35Flag.classList.toggle('hidden', !emptyApplied35);
    }

    function refreshAllCards(){
      Array.from(els.cards.children).forEach(card => {
        const shape=state.shapes.find(s => s.id === card.dataset.id);
        if(shape) refreshCard(card, shape);
      });
      refreshTotals();
    }

    function resetAll(){
      if(!confirm('現在の入力内容をすべて削除して、最初からやり直します。\n\nよろしいですか？')) return;
      state.shapes = [];
      state.globalThickness = 100;
      state.wasteRate = 0;
      state.thicknessMode = 'global';
      renderAll();
    }

    function saveToBrowser(){
      const data = {
        priceMixer15: state.priceMixer15,
        priceMixer35: state.priceMixer35,
        priceMesh: state.priceMesh,
        priceSpacer: state.priceSpacer,
        emptyFee15: state.emptyFee15,
        emptyFee35: state.emptyFee35,
        minQty15: state.minQty15,
        minQty35: state.minQty35
      };
      try{
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        alert('金額設定を保存しました。');
      }catch(e){
        alert('保存に失敗しました。');
      }
    }

    function applySavedPricing(data){
      state.priceMixer15 = data.priceMixer15 ?? 38600;
      state.priceMixer35 = data.priceMixer35 ?? 36100;
      state.priceMesh = data.priceMesh ?? '';
      state.priceSpacer = data.priceSpacer ?? '';
      state.emptyFee15 = data.emptyFee15 ?? 3000;
      state.emptyFee35 = data.emptyFee35 ?? 2000;
      state.minQty15 = data.minQty15 ?? 1.25;
      state.minQty35 = data.minQty35 ?? 3;
    }

    function loadFromBrowser(showAlert=true){
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw){
        if(showAlert) alert('保存データがありません。');
        return false;
      }
      try{
        const data = JSON.parse(raw);
        applySavedPricing(data);
        renderAll();
        if(showAlert) alert('金額設定を読込しました。');
        return true;
      }catch(e){
        console.error(e);
        if(showAlert) alert('読込に失敗しました。');
        return false;
      }
    }

    function escapeHtml(str){
      return String(str)
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;')
        .replaceAll("'",'&#039;');
    }
    function escapeAttr(str){ return escapeHtml(str); }

    els.globalThickness.addEventListener('input', e => {
      state.globalThickness = e.target.value;
      refreshAllCards();
    });
    els.wasteRate.addEventListener('change', e => {
      state.wasteRate = Number(e.target.value);
      refreshTotals();
    });

    els.priceMixer15.addEventListener('input', e => { state.priceMixer15 = e.target.value; refreshTotals(); });
    els.priceMixer35.addEventListener('input', e => { state.priceMixer35 = e.target.value; refreshTotals(); });
    els.priceMesh.addEventListener('input', e => { state.priceMesh = e.target.value; refreshTotals(); });
    els.priceSpacer.addEventListener('input', e => { state.priceSpacer = e.target.value; refreshTotals(); });
    els.emptyFee15.addEventListener('input', e => { state.emptyFee15 = e.target.value; refreshTotals(); });
    els.emptyFee35.addEventListener('input', e => { state.emptyFee35 = e.target.value; refreshTotals(); });
    els.minQty15.addEventListener('input', e => { state.minQty15 = e.target.value; refreshTotals(); });
    els.minQty35.addEventListener('input', e => { state.minQty35 = e.target.value; refreshTotals(); });

    els.modeGlobal.addEventListener('click', () => {
      state.thicknessMode = 'global';
      renderAll();
    });
    els.modePer.addEventListener('click', () => {
      state.thicknessMode = 'per';
      state.shapes.forEach(shape => {
        if(!shape.thickness && shape.type !== 'manualVolume') shape.thickness = 100;
      });
      renderAll();
    });

    els.quickButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        state.globalThickness = Number(btn.dataset.thickness);
        els.globalThickness.value = state.globalThickness;
        els.quickButtons.forEach(x => x.classList.toggle('active', x === btn));
        refreshAllCards();
      });
    });

    els.togglePriceBtn.addEventListener('click', () => {
      state.pricePanelOpen = !state.pricePanelOpen;
      renderAll();
    });

    els.saveBtn.addEventListener('click', saveToBrowser);
    els.loadBtn.addEventListener('click', () => loadFromBrowser(true));
    els.resetBtn.addEventListener('click', resetAll);

    els.shapeButtons.forEach(btn => {
      btn.addEventListener('click', () => addShape(btn.dataset.shape));
    });

    els.cards.addEventListener('input', e => {
      const id=e.target.dataset.id;
      if(!id) return;
      const shape=state.shapes.find(s => s.id === id);
      if(!shape) return;

      if(e.target.dataset.action === 'field'){
        shape.values[e.target.dataset.key] = e.target.value;
        shape.registered = false;
        shape.collapsed = false;
        shape.errorMessage = '';
      } else if(e.target.dataset.action === 'thickness'){
        shape.thickness = e.target.value;
        shape.registered = false;
        shape.collapsed = false;
        shape.errorMessage = '';
      }

      const card=e.target.closest('.card');
      if(card) refreshCard(card, shape);
      refreshTotals();
    });

    els.cards.addEventListener('click', e => {
      const btn=e.target.closest('button[data-action]');
      if(!btn) return;

      const id=btn.dataset.id;
      const shape=state.shapes.find(s => s.id === id);
      if(!shape) return;

      const action=btn.dataset.action;

      if(action === 'delete'){
        if(!confirm(`区画${getDisplayNo(shape.id)} を削除しますか？`)) return;
        state.shapes = state.shapes.filter(s => s.id !== shape.id);
        renderAll();
        return;
      }

      if(action === 'copy'){
        const clone = JSON.parse(JSON.stringify(shape));
        clone.id = uid();
        clone.registered = false;
        clone.collapsed = false;
        clone.errorMessage = '';
        state.shapes.push(clone);
        renderAll();
        return;
      }

      if(action === 'toggle'){
        if(!shape.registered) return;
        shape.collapsed = !shape.collapsed;
        refreshCard(btn.closest('.card'), shape);
        return;
      }

      if(action === 'setAdd'){
        shape.sign = 1;
        shape.errorMessage = '';
        refreshCard(btn.closest('.card'), shape);
        refreshTotals();
        return;
      }

      if(action === 'setSubtract'){
        shape.sign = -1;
        shape.errorMessage = '';
        refreshCard(btn.closest('.card'), shape);
        refreshTotals();
        return;
      }

      if(action === 'register'){
        const error=validateShape(shape);
        const card=btn.closest('.card');
        if(error){
          shape.registered = false;
          shape.errorMessage = error;
          refreshCard(card, shape);
          return;
        }
        shape.errorMessage = '';
        shape.registered = true;
        shape.collapsed = true;
        refreshCard(card, shape);
        refreshTotals();
      }
    });

    loadFromBrowser(false);
    renderAll();
  </script>
</body>
</html>
